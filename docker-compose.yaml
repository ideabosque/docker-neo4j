services:
  neo4j:
    image: neo4j:latest
    container_name: ${NEO4J_CONTAINER_NAME}
    ports:
      - "${NEO4J_BROWSER_PORT}:7474"  # Neo4j Browser
      - "${NEO4J_BOLT_PORT}:7687"     # Bolt Protocol
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    volumes:
      - ${NEO4J_HOST_DIR}/data:/data
      - ${NEO4J_HOST_DIR}/logs:/logs
      - ${NEO4J_HOST_DIR}/import:/import
      - ${NEO4J_HOST_DIR}/plugins:/plugins
    restart: unless-stopped
